id: io.github.alessandro_mattos.Purrify
runtime: io.elementary.Platform
runtime-version: '8.2'
sdk: io.elementary.Sdk
command: purrify
finish-args:
  # Wayland first. X11 fallback because real users have real setups.
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc

  # No --filesystem=home. We ask for the folders we actually review.
  - --filesystem=xdg-cache:create
  - --filesystem=xdg-data/Trash:create
  - --filesystem=~/.var/app:create
  - --filesystem=~/.npm:create
  - --filesystem=xdg-download:create
  - --filesystem=xdg-desktop:create
  - --filesystem=xdg-documents:create
modules:
  - name: purrify
    buildsystem: meson
    sources:
      - type: dir
        path: ..
